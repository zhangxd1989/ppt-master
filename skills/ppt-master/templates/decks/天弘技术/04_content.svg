<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1280" height="720" viewBox="0 0 1280 720" font-family="Helvetica Neue, 'Microsoft YaHei', 'PingFang SC', sans-serif">
<rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
<g id="content-page" transform="scale(0.5)">
  <g id="content-section-block">
    <rect x="59.81" y="65.29" width="107.06" height="107.06" fill="#B7002E"/>
  </g>
  <g id="content-title-bar">
    <rect x="175.99" y="65.22" width="1852.01" height="107.2" fill="#F2F2F2"/>
  </g>
  <g id="content-footer-strip">
    <rect x="0" y="1363.84" width="2560" height="76.16" fill="#F2F2F2"/>
    <image href="assets/image1.jpeg" x="0" y="1363.84" width="2560" height="76.16" preserveAspectRatio="none"/>
  </g>
  <g id="content-footer-mark">
    <rect x="32.33" y="1382.67" width="38.29" height="38.51" fill="#B7002E"/>
  </g>
  <g id="content-header-logo">
    <image href="assets/image2.png" x="2062.67" y="85.71" width="453.54" height="66.52" preserveAspectRatio="none"/>
  </g>
  <g id="content-page-number">
    <text x="113.34" y="138.4" text-anchor="middle" xml:space="preserve" font-size="56" font-weight="700" fill="#FFFFFF">{{PAGE_NUMBER}}</text>
  </g>
  <g id="content-page-title">
    <text x="205" y="142" text-anchor="start" xml:space="preserve" font-size="50" font-weight="700" fill="#3E4451">{{PAGE_TITLE}}</text>
  </g>
  <!-- Content area: source-space bounds x=80..2480 y=220..1340 (display: x=40..1240 y=110..670).
       Generate content in 2560×1440 source coordinates directly inside the scale(0.5) group.
       Do NOT wrap content in a nested <svg> — use <g transform="matrix(...)"> if remapping is needed.
       See shared-standards.md §"Scaled Canvas Templates" for details. -->
  <g id="content-area">
    <rect x="80" y="220" width="2400" height="1120" fill="none" stroke="#94A3B8" stroke-dasharray="14 10" stroke-width="2" opacity="0.45"/>
    <text x="1280" y="790" text-anchor="middle" xml:space="preserve" font-family="Helvetica Neue, 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="40" letter-spacing="3" fill="#94A3B8" opacity="0.55">{{CONTENT_AREA}}</text>
  </g>
</g>
</svg>
